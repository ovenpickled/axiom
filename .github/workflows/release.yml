name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            cc: gcc
            binary: axiom

          - os: ubuntu-latest
            target: linux-aarch64
            cc: aarch64-linux-gnu-gcc
            binary: axiom
            cross: true

          - os: macos-latest
            target: macos-x86_64
            cc: gcc
            arch: x86_64
            binary: axiom

          - os: macos-latest
            target: macos-aarch64
            cc: gcc
            arch: arm64
            binary: axiom

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install cross compiler (Linux ARM64 only)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          make CC=${{ matrix.cc }} VERSION=${{ steps.version.outputs.VERSION }}
          mv axiom axiom-${{ matrix.target }}

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          make CC=clang \
            VERSION=${{ steps.version.outputs.VERSION }} \
            EXTRA_FLAGS="-target ${{ matrix.arch }}-apple-macos11"
          mv axiom axiom-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: axiom-${{ matrix.target }}
          path: axiom-${{ matrix.target }}

  test:
    name: Smoke test ${{ matrix.target }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64

          - os: macos-latest
            target: macos-aarch64

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: axiom-${{ matrix.target }}
          path: .

      - name: Make executable
        run: chmod +x axiom-${{ matrix.target }}

      - name: Smoke test
        run: |
          OUTPUT=$(./axiom-${{ matrix.target }} --version)
          echo "Got: $OUTPUT"
          echo "$OUTPUT" | grep -qE "^axiom [0-9]+\.[0-9]+\.[0-9]+$"
          echo "Smoke test passed"

  test-brew:
    name: Test Homebrew formula
    needs: build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Tap and install
        run: |
          brew tap ovenpickled/axiom
          brew install axiom

      - name: Smoke test
        run: |
          OUTPUT=$(axiom --version)
          echo "Got: $OUTPUT"
          echo "$OUTPUT" | grep -qE "^axiom [0-9]+\.[0-9]+\.[0-9]+$"
          echo "Brew smoke test passed"

  release:
    name: Create GitHub Release
    needs: [build, test, test-brew]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          name: "Axiom v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            artifacts/axiom-linux-x86_64/axiom-linux-x86_64
            artifacts/axiom-linux-aarch64/axiom-linux-aarch64
            artifacts/axiom-macos-x86_64/axiom-macos-x86_64
            artifacts/axiom-macos-aarch64/axiom-macos-aarch64
